<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kopečný projekt — Projekce · Stavební dozory · Inženýring</title>
  <meta name="description" content="Komplexní stavební služby od autorizovaného inženýra — projekt, dozor i povolení pod jednou střechou. Brno a okolí." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* === Kopečný projekt — Design tokens === */
:root {
  --primary: #1B3A6B;
  --primary-700: #14305c;
  --primary-deep: #0c1d3d;
  --primary-glow: rgba(27, 58, 107, 0.08);
  --bg: #0c1d3d;          /* deep navy body */
  --bg-panel: #FFFFFF;    /* white surfaces */
  --bg-soft: #F7F7F2;     /* warm cream for subtle alt areas */
  --accent: #FACC15;
  --accent-soft: rgba(250, 204, 21, 0.12);
  --text: #0F172A;        /* on white surfaces */
  --text-inverted: #FFFFFF; /* on navy */
  --muted: #64748B;
  --muted-inverted: rgba(255,255,255,0.6);
  --border: #E5E7EB;
  --border-strong: #D7DAE0;
  --border-inverted: rgba(255,255,255,0.10);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.08);
  --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.12);
  --shadow-panel: 0 32px 80px rgba(0, 0, 0, 0.18);

  --radius-card: 24px;
  --radius-input: 16px;
  --radius-btn: 12px;
  --radius-panel: 36px;

  --container: 1280px;
  --section-pad: clamp(5rem, 10vw, 8rem);

  --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; }

html { scroll-behavior: smooth; background: var(--bg); }

html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  color: var(--text-inverted);
  font-family: var(--font-sans);
  font-size: 17px;
  line-height: 1.6;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body { min-height: 100vh; position: relative; }

/* Animated shader background sits fixed behind everything */
#shader-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  background: linear-gradient(135deg, #0c1d3d 0%, #1B3A6B 50%, #0c1d3d 100%);
}

::selection { background: var(--accent); color: var(--text); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* === Layout === */
.container {
  width: 100%;
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 clamp(1.25rem, 3vw, 2rem);
}

section {
  padding-top: var(--section-pad);
  padding-bottom: var(--section-pad);
  position: relative;
}

/* Sections sit directly on the navy background; only inner cards ("bubbles") are white */
section.panel {
  background: transparent;
  color: var(--text-inverted);
  border-radius: 0;
  margin: 0;
  padding-top: clamp(4.5rem, 8vw, 7rem);
  padding-bottom: clamp(4.5rem, 8vw, 7rem);
  box-shadow: none;
  overflow: visible;
}
section.panel .h2,
section.panel .h3,
section.panel h3,
section.panel .section-num-divider .divider-num {
  color: var(--text-inverted);
}
section.panel .lead { color: rgba(255,255,255,0.6); }
section.panel .section-num-divider .line { background: rgba(255,255,255,0.12); }

/* === Type === */
.h1 {
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: clamp(3.5rem, 12vw, 10rem);
  letter-spacing: -0.045em;
  line-height: 0.92;
  margin: 0;
}
.h2 {
  font-weight: 600;
  font-size: clamp(2.5rem, 5vw, 4rem);
  letter-spacing: -0.03em;
  line-height: 1.02;
  margin: 0;
}
.h3 {
  font-weight: 600;
  font-size: clamp(1.5rem, 2.5vw, 2rem);
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin: 0;
}
.mono {
  font-family: var(--font-mono);
  font-weight: 400;
  letter-spacing: 0;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}
.eyebrow::before {
  content: "";
  width: 8px; height: 8px;
  border-radius: 9999px;
  background: var(--accent);
  display: inline-block;
}
.lead {
  color: var(--muted);
  font-size: 1.125rem;
  line-height: 1.6;
}
.divider-num {
  font-family: var(--font-mono);
  color: var(--muted);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
}

/* === Nav === */
.nav-shell {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 1.5rem clamp(1.25rem, 3vw, 2rem);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  pointer-events: none;
}
.nav-shell > * { pointer-events: auto; }

.brand {
  display: inline-flex;
  align-items: center;
  gap: 0.85rem;
  font-weight: 500;
  font-size: 1.05rem;
  letter-spacing: -0.015em;
  background: rgba(255, 255, 255, 0.10);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  padding: 0.65rem 1.25rem 0.65rem 0.7rem;
  border-radius: 9999px;
  color: var(--text-inverted);
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  transition: transform 0.3s ease;
}
.brand-logo-only {
  padding: 0.4rem;
  gap: 0;
}
.brand-logo-only .brand-mark {
  width: 76px; height: 76px;
  border-radius: 9999px;
  padding: 8px;
}
.brand:hover .brand-mark { transform: rotate(-6deg); }
.brand-mark {
  width: 44px; height: 44px;
  border-radius: 14px;
  background: rgba(255,255,255,0.92);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 4px;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease;
  border: 1px solid rgba(255,255,255,0.2);
}
.brand-mark img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 4px 4px auto auto;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 9999px;
}
.brand-text { line-height: 1; display: flex; flex-direction: column; gap: 4px; }
.brand-text strong { font-weight: 600; letter-spacing: -0.015em; }
.brand-text small {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.nav {
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  background: rgba(255, 255, 255, 0.10);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.18);
  padding: 0.5rem;
  border-radius: 9999px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.nav a {
  padding: 0.75rem 1.15rem;
  border-radius: 9999px;
  font-size: 1rem;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  transition: background 0.25s ease, color 0.25s ease;
  color: var(--text-inverted);
}
.nav a:hover { background: rgba(255,255,255,0.12); color: var(--accent); }
.nav a.is-active { background: var(--accent); color: var(--text); }
.nav a.is-active:hover { background: var(--accent); color: var(--text); }
.nav a .nav-num {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--muted-inverted);
  letter-spacing: 0.05em;
}
.nav a:hover .nav-num { color: var(--accent); }
.nav a.is-active .nav-num { color: var(--primary); }
.nav-cta {
  margin-left: 0.25rem;
  padding: 0.75rem 1.25rem !important;
  background: var(--accent) !important;
  color: var(--text) !important;
  font-weight: 500;
}
.nav-cta:hover { background: #fbd84a !important; color: var(--text) !important; }
.nav-cta .nav-num { display: none; }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.menu-toggle { display: none; }
.mobile-menu { display: none; }

@media (max-width: 820px) {
  .nav { display: none; }
  .menu-toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(247, 247, 242, 0.75);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(15, 23, 42, 0.06);
    padding: 0.65rem 1.1rem 0.65rem 1rem;
    border-radius: 9999px;
    font-size: 0.92rem;
    font-weight: 500;
    opacity: 0;
    animation: nav-in 0.6s ease 0.4s forwards;
  }
  .menu-toggle .bars {
    display: inline-flex; flex-direction: column; gap: 3px;
  }
  .menu-toggle .bars span {
    width: 16px; height: 1.5px; background: var(--text); border-radius: 2px;
  }
  .mobile-menu {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 49;
    padding: 6rem 1.5rem 2rem;
    flex-direction: column;
    gap: 0.5rem;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    padding: 1rem 1.25rem;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 1.5rem;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .mobile-menu a .nav-num { font-family: var(--font-mono); font-size: 0.85rem; color: var(--muted); }
}

/* === Hero === */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding-top: 8rem;
  padding-bottom: 5rem;
  position: relative;
  overflow: visible;
  color: var(--text-inverted);
}
.hero-glow,
.hero-shader { display: none; }

.hero-logo-wrap {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  padding: 0 clamp(1.25rem, 3vw, 2rem);
  position: relative;
}
.hero-logo {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.35));
}
.hero-logo-glow {
  position: absolute;
  inset: -10% -10%;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(250,204,21,0.16) 0%, transparent 55%),
    radial-gradient(ellipse at 30% 60%, rgba(120,180,255,0.18) 0%, transparent 60%);
  filter: blur(40px);
  z-index: -1;
  pointer-events: none;
}

/* HERO meta below the logo */
.hero-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  margin-top: clamp(2.5rem, 5vw, 4rem);
  flex-wrap: wrap;
  width: 100%;
  max-width: 1100px;
  margin-left: auto;
  margin-right: auto;
  padding: 0 clamp(1.25rem, 3vw, 2rem);
}

.hero-services {
  display: inline-flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.55rem;
}
.hero-services .chip {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.6rem 1.15rem 0.6rem 1rem;
  border-radius: 9999px;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(255,255,255,0.55);
  color: var(--primary);
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: -0.01em;
  backdrop-filter: blur(8px);
}
.hero-services .chip .dot {
  width: 8px; height: 8px; border-radius: 9999px;
  display: inline-block;
}
.hero-services .chip.blue .dot { background: var(--primary); }
.hero-services .chip.yellow {
  background: var(--accent);
  color: var(--primary);
  border-color: var(--accent);
}
.hero-services .chip.yellow .dot { background: var(--primary); }

.hero-tag {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted-inverted);
  letter-spacing: 0.06em;
  max-width: 24ch;
  line-height: 1.5;
  padding-left: 1rem;
  border-left: 2px solid var(--accent);
  text-transform: uppercase;
}

.hero-claim-block {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 3rem;
  margin-top: 3rem;
  padding-top: 2.5rem;
  border-top: 1px solid var(--border-inverted);
  flex-wrap: wrap;
  width: 100%;
  max-width: 1100px;
  margin-left: auto;
  margin-right: auto;
  padding-left: clamp(1.25rem, 3vw, 2rem);
  padding-right: clamp(1.25rem, 3vw, 2rem);
}
.hero-claim {
  font-size: clamp(1.125rem, 1.5vw, 1.5rem);
  font-weight: 400;
  letter-spacing: -0.015em;
  max-width: 42ch;
  line-height: 1.4;
  color: rgba(255,255,255,0.85);
}
.hero-cta-row { display: inline-flex; gap: 0.75rem; flex-wrap: wrap; }

.hero-eyebrow-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
  flex-wrap: wrap;
  opacity: 0;
  animation: fade-up 0.7s ease 0.5s forwards;
}
.hero-mark {
  width: 72px; height: 72px;
  background: #fff;
  border-radius: 20px;
  display: inline-flex;
  align-items: center; justify-content: center;
  padding: 6px;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 8px 24px rgba(27,58,107,0.12);
  border: 1px solid var(--border);
}
.hero-mark img {
  width: 100%; height: 100%; object-fit: contain;
}
.hero-mark::after {
  content: "";
  position: absolute;
  top: -4px; right: -4px;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 9999px;
  box-shadow: 0 0 0 3px var(--bg);
  z-index: 2;
}
.hero-eyebrow-text {
  display: flex; flex-direction: column; gap: 0.25rem;
}
.hero-eyebrow-text .row-1 {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--primary);
  font-weight: 500;
}
.hero-eyebrow-text .row-2 {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

/* Shutter text title */
.hero-title {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  font-weight: 600;
  font-size: clamp(3rem, 11.5vw, 11rem);
  letter-spacing: -0.055em;
  line-height: 0.88;
  width: 100%;
  color: var(--primary);
}
.hero-title-row {
  display: block;
  white-space: nowrap;
  position: relative;
}
.hero-title-row.row-2 {
  margin-top: -0.04em;
}

.shutter {
  display: inline-flex;
  align-items: baseline;
}
.shutter-char {
  position: relative;
  display: inline-block;
  overflow: hidden;
  vertical-align: bottom;
}
.shutter-base {
  display: inline-block;
  opacity: 0;
  filter: blur(10px);
  animation: shutter-base 0.8s ease forwards;
  animation-delay: var(--d, 0s);
}
@keyframes shutter-base {
  to { opacity: 1; filter: blur(0); }
}
.shutter-slice {
  position: absolute;
  inset: 0;
  pointer-events: none;
  display: inline-block;
  font-weight: inherit;
  letter-spacing: inherit;
  line-height: inherit;
  transform: translateX(-110%);
  opacity: 0;
  animation: shutter-sweep 0.7s ease forwards;
  animation-delay: var(--d, 0s);
}
.shutter-slice.top {
  color: var(--accent);
  clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
}
.shutter-slice.mid {
  color: var(--accent);
  clip-path: polygon(0 35%, 100% 35%, 100% 65%, 0 65%);
  transform: translateX(110%);
  animation-name: shutter-sweep-rev;
  animation-delay: calc(var(--d, 0s) + 0.08s);
}
.shutter-slice.bot {
  color: var(--accent);
  clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
  animation-delay: calc(var(--d, 0s) + 0.16s);
}
@keyframes shutter-sweep {
  0%   { transform: translateX(-110%); opacity: 0; }
  35%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translateX(110%); opacity: 0; }
}
@keyframes shutter-sweep-rev {
  0%   { transform: translateX(110%); opacity: 0; }
  35%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translateX(-110%); opacity: 0; }
}

.hero-meta {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  margin-top: clamp(2rem, 5vw, 3.5rem);
  flex-wrap: wrap;
  opacity: 0;
  animation: fade-up 0.8s ease 1.1s forwards;
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes nav-in {
  to { opacity: 1; transform: translateY(0); }
}

.hero-services {
  display: inline-flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem 0.85rem;
  font-size: clamp(1.125rem, 1.6vw, 1.4rem);
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--text);
}
.hero-services .chip {
  display: inline-flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.45rem 1rem 0.45rem 0.85rem;
  border-radius: 9999px;
  background: #fff;
  border: 1px solid var(--border);
  font-size: 1rem;
  letter-spacing: -0.01em;
  box-shadow: 0 1px 2px rgba(15,23,42,0.04);
}
.hero-services .chip .dot {
  width: 8px; height: 8px; border-radius: 9999px;
  display: inline-block;
}
.hero-services .chip.blue .dot { background: var(--primary); }
.hero-services .chip.yellow .dot { background: var(--accent); }
.hero-tag {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  max-width: 24ch;
  line-height: 1.5;
  padding-left: 1rem;
  border-left: 2px solid var(--accent);
}

.hero-claim-block {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 3rem;
  margin-top: 2.5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  opacity: 0;
  animation: fade-up 0.8s ease 1.3s forwards;
  flex-wrap: wrap;
}
.hero-claim {
  font-size: clamp(1.125rem, 1.4vw, 1.35rem);
  font-weight: 500;
  letter-spacing: -0.015em;
  max-width: 42ch;
  line-height: 1.4;
}
.hero-cta-row { display: inline-flex; gap: 0.75rem; flex-wrap: wrap; }

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.65rem;
  padding: 0.95rem 1.4rem;
  border-radius: var(--radius-btn);
  font-size: 1rem;
  font-weight: 500;
  border: 1px solid transparent;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
  position: relative;
}
.btn-primary {
  background: var(--accent);
  color: var(--text);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(250, 204, 21, 0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--text-inverted);
  border: 1px solid rgba(255,255,255,0.4);
}
.btn-secondary:hover {
  background: var(--text-inverted);
  color: var(--text);
  transform: translateY(-2px);
  border-color: var(--text-inverted);
}
.btn-secondary.btn-light {
  color: var(--text-inverted);
  border-color: rgba(255,255,255,0.45);
}
.btn-secondary.btn-light:hover {
  background: var(--text-inverted);
  color: var(--text);
  border-color: var(--text-inverted);
}
.btn-ghost {
  background: rgba(15,23,42,0.04);
  color: var(--text);
}
.btn-ghost:hover { background: rgba(15,23,42,0.08); }

.btn-arrow {
  display: inline-block;
  transition: transform 0.3s ease;
}
.btn:hover .btn-arrow { transform: translateX(4px); }

/* === Section header === */
.section-head {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 2rem;
  margin-bottom: clamp(2.5rem, 5vw, 4rem);
}
.section-head .head-meta {
  text-align: right;
  color: rgba(255,255,255,0.55);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
@media (max-width: 700px) {
  .section-head { grid-template-columns: 1fr; }
  .section-head .head-meta { text-align: left; }
}

/* Section dividers on dark bg */
.section-num-divider {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 2rem;
}
.section-num-divider .divider-num {
  font-family: var(--font-mono);
  color: rgba(255,255,255,0.5);
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.section-num-divider .divider-num:first-child {
  position: relative;
  padding-bottom: 0.35rem;
  color: rgba(255,255,255,0.85);
}
.section-num-divider .divider-num:first-child::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -1px;
  width: 36px;
  height: 3px;
  background: var(--accent);
  border-radius: 9999px;
}
.section-num-divider .line {
  flex: 1; height: 1px; background: rgba(255,255,255,0.12);
}

/* === Cards === */
.card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: 2rem;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
}
.card.lift:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
  border-color: var(--border-strong);
}

/* === Kontakt v2 ===================================================== */
.kontakt-section {
  position: relative;
}
.kontakt-header {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 3rem;
  align-items: end;
  margin-bottom: clamp(3rem, 5vw, 4.5rem);
}
@media (max-width: 800px) {
  .kontakt-header { grid-template-columns: 1fr; gap: 1.5rem; }
}
.kontakt-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  padding: 0.5rem 1rem 0.5rem 0.85rem;
  border-radius: 9999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  margin-bottom: 1.5rem;
}
.kontakt-eyebrow .pulse {
  width: 8px; height: 8px; border-radius: 9999px; background: #4ade80;
  box-shadow: 0 0 0 0 rgba(74,222,128,0.6);
  animation: pulse 1.8s infinite;
}
.kontakt-title {
  font-size: clamp(2.5rem, 5.5vw, 4.5rem);
  letter-spacing: -0.035em;
  line-height: 1.02;
  margin: 0;
  color: var(--text-inverted);
}
.kontakt-title .hl {
  display: inline-block;
  position: relative;
  color: var(--accent);
  font-style: italic;
}
.kontakt-title .hl::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0.08em;
  height: 0.14em;
  background: var(--accent);
  opacity: 0.2;
  border-radius: 9999px;
  transform: scaleX(0);
  transform-origin: left center;
  animation: hl-draw 1s cubic-bezier(0.2,0.7,0.2,1) 0.6s forwards;
}
@keyframes hl-draw {
  to { transform: scaleX(1); }
}
.kontakt-lead {
  color: rgba(255,255,255,0.75);
  font-size: 1.05rem;
  line-height: 1.55;
  max-width: 36ch;
  margin: 0;
  align-self: end;
  text-align: right;
}
.kontakt-lead strong { color: #fff; font-weight: 500; }
@media (max-width: 800px) {
  .kontakt-lead { text-align: left; }
}

/* Big tap-to-act bubbles */
.kontakt-quick {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 2.5rem;
}
@media (max-width: 800px) {
  .kontakt-quick { grid-template-columns: 1fr; }
}
.quick-bubble {
  position: relative;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  padding: 1.5rem 1.5rem 1.5rem 1.4rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 9999px;
  color: #fff;
  transition: transform 0.35s cubic-bezier(0.2,0.7,0.2,1),
              background 0.3s ease,
              border-color 0.3s ease,
              box-shadow 0.35s ease;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
}
.quick-bubble::before {
  content: "";
  position: absolute;
  inset: -1px;
  background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(250,204,21,0.18), transparent 50%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  border-radius: inherit;
}
.quick-bubble:hover {
  transform: translateY(-3px);
  background: rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.25);
  box-shadow: 0 16px 36px rgba(0,0,0,0.25);
}
.quick-bubble:hover::before { opacity: 1; }
.quick-bubble .qb-icon {
  width: 56px; height: 56px;
  flex-shrink: 0;
  border-radius: 9999px;
  background: var(--accent);
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--primary);
  position: relative;
  z-index: 1;
  transition: transform 0.35s cubic-bezier(0.2,0.7,0.2,1);
}
.quick-bubble:hover .qb-icon {
  transform: rotate(-8deg) scale(1.05);
}
.quick-bubble .qb-body {
  display: flex; flex-direction: column; gap: 0.25rem;
  position: relative; z-index: 1;
  min-width: 0;
}
.quick-bubble .qb-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.55);
}
.quick-bubble .qb-value {
  font-size: clamp(1.1rem, 1.6vw, 1.45rem);
  font-weight: 500;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.quick-bubble .qb-arrow {
  margin-left: auto;
  width: 44px; height: 44px;
  flex-shrink: 0;
  border-radius: 9999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.3s ease, transform 0.3s ease;
  position: relative; z-index: 1;
}
.quick-bubble:hover .qb-arrow {
  background: var(--accent);
  color: var(--primary);
  transform: translateX(4px);
}
.quick-bubble .qb-copy {
  position: absolute;
  top: 0.85rem; right: 0.85rem;
  width: 30px; height: 30px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  font-size: 0.95rem;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.25s ease, background 0.25s ease, color 0.25s ease;
}
.quick-bubble:hover .qb-copy { opacity: 1; }
.quick-bubble .qb-copy:hover { background: var(--accent); color: var(--primary); }

/* "or" separator */
.kontakt-or {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  margin-bottom: 2rem;
}
.kontakt-or .line {
  flex: 1; height: 1px; background: rgba(255,255,255,0.12);
}
.kontakt-or .or-text {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
}

/* Form card v2 */
.kontakt-form-wrap {
  max-width: 780px;
  margin: 0 auto;
}
.form-card-v2 {
  background: #fff;
  color: var(--text);
  border-radius: 28px;
  padding: clamp(2rem, 3.5vw, 3rem);
  box-shadow: 0 32px 80px rgba(0,0,0,0.28),
              0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  overflow: hidden;
}
.form-card-v2::before {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 220px; height: 220px;
  border-radius: 9999px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  opacity: 0.18;
  pointer-events: none;
}
.form-card-v2-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1.5rem;
  margin-bottom: 2rem;
}
.form-step {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0.4rem 0.85rem;
  background: var(--bg-soft, #F7F7F2);
  border-radius: 9999px;
  border: 1px solid var(--border);
}
.form-step .step-dot {
  width: 6px; height: 6px; border-radius: 9999px;
  background: var(--border-strong);
}
.form-step .step-dot.active { background: var(--accent); }

.form-fields {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.875rem;
}
@media (min-width: 640px) {
  .form-fields { grid-template-columns: 1fr 1fr; }
  .form-fields > .field:first-child { grid-column: 1 / -1; }
}

.form-submit-v2 {
  margin-top: 1.25rem;
  width: 100%;
  justify-content: center;
  padding: 1.15rem 1.5rem;
  font-size: 1.05rem;
  font-weight: 500;
  position: relative;
  overflow: hidden;
}

.form-success-v2 {
  text-align: center;
  padding: 1rem 1rem 1.5rem;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.form-success-v2 .success-icon {
  width: 72px; height: 72px;
  border-radius: 9999px;
  background: #16a34a;
  color: #fff;
  display: inline-flex;
  align-items: center; justify-content: center;
  margin-bottom: 1.25rem;
  box-shadow: 0 0 0 6px rgba(22,163,74,0.15);
  animation: bounce-in 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bounce-in {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}
.form-success-v2 .success-title {
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.form-success-v2 .success-sub {
  color: var(--muted);
  font-size: 0.95rem;
  max-width: 36ch;
}

/* Business meta strip */
.kontakt-meta {
  margin-top: clamp(3rem, 5vw, 4rem);
  padding-top: 2.5rem;
  border-top: 1px solid rgba(255,255,255,0.10);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1.5rem 2rem;
}
.meta-item {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  position: relative;
}
.meta-item.is-copyable { cursor: pointer; }
.meta-item .meta-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}
.meta-item .meta-value {
  color: #fff;
  font-size: 0.95rem;
  letter-spacing: -0.01em;
  font-weight: 500;
  line-height: 1.4;
}
.meta-item .meta-copy {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(250,204,21,0.7);
  opacity: 0;
  transition: opacity 0.25s ease;
}
.meta-item.is-copyable:hover .meta-copy { opacity: 1; }
.meta-item.is-copyable:hover .meta-value { color: var(--accent); }
.meta-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 8px; border-radius: 4px; }

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.55); }
  70%  { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
  100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
}

/* === Form (shared field/gdpr/honeypot styles used by Kontakt v2) === */
.form-title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
.form-sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }

.field {
  position: relative;
}
.field input {
  width: 100%;
  padding: 1.05rem 1.15rem 0.65rem;
  font: inherit;
  font-size: 1rem;
  background: var(--bg-soft, #F7F7F2);
  border: 1px solid var(--border);
  border-radius: var(--radius-input);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.field input:focus {
  border-color: var(--primary);
  background: #fff;
}
.field label {
  position: absolute;
  left: 1.15rem;
  top: 1.05rem;
  font-size: 1rem;
  color: var(--muted);
  pointer-events: none;
  transition: all 0.2s;
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label {
  top: 0.35rem;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--primary);
  font-family: var(--font-mono);
}
.field.error input { border-color: #dc2626; }
.field .err-msg {
  display: block;
  margin-top: 0.4rem;
  margin-left: 0.5rem;
  font-size: 0.78rem;
  color: #dc2626;
  font-family: var(--font-mono);
}
.honeypot { position: absolute; left: -9999px; }
.gdpr {
  display: flex;
  align-items: flex-start;
  gap: 0.7rem;
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.5;
  margin-top: 0.4rem;
  cursor: pointer;
  user-select: none;
}
.gdpr input { position: absolute; opacity: 0; }
.gdpr .box {
  width: 18px; height: 18px;
  border-radius: 6px;
  border: 1px solid var(--border-strong);
  background: var(--bg-soft, #F7F7F2);
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.15s;
}
.gdpr input:checked + .box {
  background: var(--primary);
  border-color: var(--primary);
}
.gdpr .box svg { opacity: 0; transition: opacity 0.15s; }
.gdpr input:checked + .box svg { opacity: 1; }
.gdpr a { color: var(--text); text-decoration: underline; text-decoration-color: var(--border-strong); text-underline-offset: 3px; }

/* === Služby === */
.sluzby-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}
@media (max-width: 900px) { .sluzby-grid { grid-template-columns: 1fr; } }

.service-card {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  padding: clamp(1.75rem, 2.5vw, 2.25rem);
  height: 100%;
  position: relative;
  overflow: hidden;
}
.service-card .svc-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: var(--primary);
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--bg);
  position: relative;
  flex-shrink: 0;
}
.service-card .svc-icon::after {
  content: ""; position: absolute;
  inset: auto -6px -6px auto;
  width: 18px; height: 18px;
  border-radius: 9999px;
  background: var(--accent);
}
.service-card.v-accent .svc-icon {
  background: var(--accent);
  color: var(--text);
}
.service-card.v-accent .svc-icon::after {
  background: var(--primary);
}
.service-card.v-accent .svc-list li::before {
  background: var(--accent);
  height: 3px;
}
.service-card .svc-num {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}
.service-card h3 { letter-spacing: -0.025em; }
.service-card .svc-desc { color: var(--muted); font-size: 0.95rem; line-height: 1.55; }
.service-card .svc-list {
  list-style: none; padding: 0; margin: auto 0 0; display: flex; flex-direction: column;
  border-top: 1px solid var(--border);
}
.service-card .svc-list li {
  padding: 0.85rem 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.85rem;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--primary);
}
.service-card .svc-list li:last-child { border-bottom: none; }
.service-card .svc-list li::before {
  content: ""; width: 14px; height: 1.5px; background: var(--primary); flex-shrink: 0;
}

.sluzby-cta {
  margin-top: 2rem;
  padding: clamp(2rem, 4vw, 3rem);
  background: rgba(255,255,255,0.06);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-card);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 2rem;
  align-items: center;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(8px);
}
.sluzby-cta::before {
  content: ""; position: absolute;
  top: -30%; right: 10%; width: 320px; height: 320px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
  opacity: 0.18; pointer-events: none;
}
.sluzby-cta h3 { font-size: clamp(1.5rem, 2.5vw, 2rem); letter-spacing: -0.025em; max-width: 30ch; position: relative; color: #fff; }
.sluzby-cta .sub { color: rgba(255,255,255,0.55); font-size: 0.95rem; margin-top: 0.5rem; }
@media (max-width: 700px) {
  .sluzby-cta { grid-template-columns: 1fr; }
}

/* === Realizace bento === */
.realizace-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 110px;
  gap: 1.25rem;
}
.realizace-cell {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-card);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.realizace-cell:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
.realizace-cell .img {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(135deg, rgba(27,58,107,0.06) 0 1px, transparent 1px 14px),
    linear-gradient(180deg, rgba(27,58,107,0.04), rgba(27,58,107,0.10));
  transition: transform 0.6s ease;
}
.realizace-cell:hover .img { transform: scale(1.04); }
.realizace-cell .meta {
  position: absolute;
  inset: auto 0 0 0;
  padding: 1rem 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 1rem;
  background: linear-gradient(180deg, transparent 0%, rgba(15,23,42,0.6) 80%);
  color: #fff;
}
.realizace-cell .meta .title { font-weight: 500; font-size: 1rem; letter-spacing: -0.01em; }
.realizace-cell .meta .loc { font-family: var(--font-mono); font-size: 0.7rem; opacity: 0.75; letter-spacing: 0.06em; }
.realizace-cell .meta .year {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  background: rgba(255,255,255,0.16);
  backdrop-filter: blur(8px);
  padding: 0.3rem 0.55rem;
  border-radius: 9999px;
  border: 1px solid rgba(255,255,255,0.15);
}
.realizace-cell .placeholder-label {
  position: absolute;
  top: 1rem;
  left: 1rem;
  font-family: var(--font-mono);
  font-size: 0.66rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--primary);
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  padding: 0.35rem 0.6rem;
  border-radius: 9999px;
}
/* spans for bento */
.r-43-l { grid-column: span 3; grid-row: span 4; }
.r-34   { grid-column: span 2; grid-row: span 5; }
.r-43   { grid-column: span 3; grid-row: span 3; }
.r-169  { grid-column: span 4; grid-row: span 3; }
.r-sq   { grid-column: span 2; grid-row: span 3; }
.r-tall { grid-column: span 2; grid-row: span 4; }
.r-wide { grid-column: span 4; grid-row: span 3; }
.r-sm   { grid-column: span 2; grid-row: span 3; }

@media (max-width: 900px) {
  .realizace-grid { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 130px; }
  .r-43-l, .r-34, .r-43, .r-169, .r-sq, .r-tall, .r-wide, .r-sm { grid-column: span 2; grid-row: span 2; }
}

/* === Hodnocení === */
.recenze-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  align-items: start;
}
.recenze-col { display: flex; flex-direction: column; gap: 1.25rem; }
.recenze-col.offset { margin-top: 3.5rem; }
@media (max-width: 800px) {
  .recenze-wrap { grid-template-columns: 1fr; }
  .recenze-col.offset { margin-top: 0; }
}

.recenze-card {
  padding: clamp(1.75rem, 2.4vw, 2.25rem);
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
  background: #fff;
}
.recenze-card.muted { background: var(--primary); color: #fff; border-color: var(--primary); }
.recenze-card .stars { display: inline-flex; gap: 0.2rem; color: var(--accent); }
.recenze-card .stars svg { width: 16px; height: 16px; }
.recenze-card .quote { font-size: 1.1rem; line-height: 1.5; font-weight: 400; letter-spacing: -0.01em; color: var(--primary); }
.recenze-card.muted .quote { color: #fff; }
.recenze-card .meta {
  display: flex; align-items: center; gap: 0.85rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.recenze-card.muted .meta { border-top-color: rgba(255,255,255,0.15); }
.recenze-card .avatar {
  width: 38px; height: 38px; border-radius: 9999px;
  background: var(--accent);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 0.85rem; color: var(--text); font-weight: 500;
  flex-shrink: 0;
}
.recenze-card .name { font-weight: 500; font-size: 0.95rem; }
.recenze-card .loc { font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 2px; }
.recenze-card.muted .loc { color: rgba(255,255,255,0.55); }

.recenze-summary {
  padding: clamp(1.75rem, 2.4vw, 2.25rem);
  border-radius: var(--radius-card);
  background: var(--accent);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  border: 1px solid rgba(15,23,42,0.06);
}
.recenze-summary .big {
  font-weight: 600;
  font-size: clamp(2.5rem, 4vw, 3.25rem);
  letter-spacing: -0.04em;
  line-height: 1;
}
.recenze-summary .small { font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); opacity: 0.7; }

/* === Patička === */
footer {
  background: transparent;
  color: rgba(255,255,255,0.75);
  padding-top: clamp(4rem, 7vw, 6rem);
  padding-bottom: 2rem;
  margin: 0;
  margin-top: 0;
  border-radius: 0;
  position: relative;
  overflow: hidden;
  border-top: 1px solid rgba(255,255,255,0.08);
}
footer .container { position: relative; }
footer::before {
  content: ""; position: absolute;
  top: -10%; left: -10%; width: 600px; height: 600px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  opacity: 0.04; pointer-events: none;
}
footer h4 {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: rgba(255,255,255,0.5);
  margin: 0 0 1.25rem;
  font-weight: 400;
}
.footer-brand-block {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
}
.footer-mark {
  width: 64px; height: 64px;
  background: #fff;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 6px;
  overflow: hidden;
}
.footer-mark img {
  width: 100%; height: 100%; object-fit: contain;
}
.footer-est {
  display: inline-flex; align-items: center; gap: 0.55rem;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}
.footer-est .dot {
  width: 8px; height: 8px; border-radius: 9999px; background: var(--accent);
}
.dot-accent { color: var(--accent); }
footer a { color: #fff; transition: opacity 0.2s; }
footer a:hover { opacity: 0.7; }
.footer-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 3rem;
  padding-bottom: 3rem;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
@media (max-width: 800px) { .footer-grid { grid-template-columns: 1fr; gap: 2rem; } }
.footer-brand-lg {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 600;
  letter-spacing: -0.035em;
  line-height: 0.95;
  color: #fff;
  margin: 0 0 1rem;
}
.footer-claim { color: rgba(255,255,255,0.6); max-width: 30ch; font-size: 0.95rem; }
.footer-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.7rem; font-size: 0.92rem; }
.footer-legal {
  margin-top: 2rem;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.4);
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem 1rem;
  justify-content: space-between;
  line-height: 1.7;
}

/* === Scroll reveal (JS-augmented) === */
.reveal {
  /* Default: visible (SSR-safe). JS adds .pre to hide until observer triggers. */
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.85s cubic-bezier(0.2, 0.7, 0.2, 1), transform 0.85s cubic-bezier(0.2, 0.7, 0.2, 1);
  transition-delay: var(--reveal-delay, 0s);
}
.reveal.pre {
  opacity: 0;
  transform: translateY(28px);
}
.reveal.slide-l.pre { transform: translate(-56px, 0); }
.reveal.slide-r.pre { transform: translate(56px, 0); }
.reveal.scale-in.pre { transform: scale(0.94); }
.reveal.slide-l,
.reveal.slide-r { transform: translate(0, 0); }

/* Hero entrance */
.hero-logo {
  animation: hero-logo-in 1.4s cubic-bezier(0.2, 0.7, 0.2, 1) 0.15s both;
}
@keyframes hero-logo-in {
  0%   { opacity: 0; transform: translateY(16px) scale(0.96); filter: blur(8px); }
  60%  { filter: blur(0); }
  100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
}
.hero-services { animation: fade-up 0.8s ease 1.0s both; }
.hero-tag { animation: fade-up 0.8s ease 1.15s both; }
.hero-claim-block { animation: fade-up 0.8s ease 1.3s both; }

/* Nav pill entrance */
.brand { animation: nav-drop 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) 0.3s both; }
.nav   { animation: nav-drop 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) 0.45s both; }
@keyframes nav-drop {
  from { opacity: 0; transform: translateY(-14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Section number divider: yellow underline draws in when revealed */
.reveal .section-num-divider .divider-num:first-child::after,
.section-num-divider.reveal .divider-num:first-child::after {
  transform-origin: left center;
  animation: divider-draw 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) 0.2s both;
}
@keyframes divider-draw {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* Card lift hover (subtle nudge) */
.card.lift,
.realizace-cell,
.service-card,
.recenze-card {
  will-change: transform;
}

/* Floating service-card icon pop */
.service-card .svc-icon {
  transition: transform 0.45s cubic-bezier(0.2, 0.7, 0.2, 1), box-shadow 0.45s ease;
}
.service-card.lift:hover .svc-icon {
  transform: translateY(-2px) rotate(-3deg);
  box-shadow: 0 12px 24px rgba(27,58,107,0.22);
}
.service-card.v-accent.lift:hover .svc-icon {
  box-shadow: 0 12px 24px rgba(250,204,21,0.35);
}

/* Realizace card image zoom on hover already exists — add fade on label */
.realizace-cell .placeholder-label { transition: opacity 0.35s ease; }
.realizace-cell:hover .placeholder-label { opacity: 0.6; }

/* Submit button ripple-ish */
.form-submit { position: relative; overflow: hidden; }
.form-submit::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
  transform: translateX(-120%);
  transition: transform 0.6s ease;
  pointer-events: none;
}
.form-submit:hover::after { transform: translateX(120%); }

/* Marquee subtle blue glow drift behind nav-cta */
.nav-cta { position: relative; overflow: hidden; }
.nav-cta::before {
  content: "";
  position: absolute; inset: -50%;
  background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 50%);
  transform: translate(-30%, -30%);
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
  pointer-events: none;
}
.nav-cta:hover::before { opacity: 1; transform: translate(20%, 20%); }

/* Brand mark rotate on hover already exists; add accent ring pulse */
.brand-mark { position: relative; }
.brand:hover .brand-mark::after {
  content: ""; position: absolute; inset: -3px; border-radius: inherit;
  border: 1px solid var(--accent);
  animation: ring-pulse 1.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes ring-pulse {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50%      { transform: scale(1.15); opacity: 0; }
}

/* === Toast === */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(120%);
  background: var(--text);
  color: var(--bg);
  padding: 0.85rem 1.25rem;
  border-radius: 9999px;
  font-size: 0.9rem;
  font-weight: 500;
  z-index: 100;
  transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  box-shadow: var(--shadow-lg);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast .check {
  width: 18px; height: 18px; border-radius: 9999px;
  background: #16a34a; color: white;
  display: inline-flex; align-items: center; justify-content: center;
}

/* === Lightbox === */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  padding: 2rem;
}
.lightbox.open { display: flex; }
.lightbox .lb-content {
  background: #fff;
  border-radius: var(--radius-card);
  max-width: 900px; width: 100%;
  overflow: hidden;
  position: relative;
  max-height: 90vh;
  display: flex; flex-direction: column;
}
.lightbox .lb-img {
  height: 50vh;
  background:
    repeating-linear-gradient(135deg, rgba(27,58,107,0.08) 0 1px, transparent 1px 16px),
    linear-gradient(180deg, rgba(27,58,107,0.05), rgba(27,58,107,0.14));
  position: relative;
}
.lightbox .lb-info {
  padding: 1.5rem 2rem 2rem;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.lightbox .lb-title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
.lightbox .lb-meta { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.lightbox .lb-close {
  position: absolute;
  top: 1rem; right: 1rem;
  width: 40px; height: 40px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.9);
  border: none;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.lightbox .lb-close:hover { background: #fff; }

/* === Focus ring === */
:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 3px;
  border-radius: 4px;
}
button:focus-visible, a:focus-visible { outline-offset: 4px; }

/* === EXTRA: Nav as a white pill with dark text inside === */
.nav {
  background: rgba(255, 255, 255, 0.95) !important;
  border-color: rgba(15, 23, 42, 0.06) !important;
  backdrop-filter: blur(18px) !important;
  -webkit-backdrop-filter: blur(18px) !important;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18), 0 1px 0 rgba(255,255,255,0.6) inset !important;
}
.nav a {
  color: var(--text) !important;
  text-shadow: none !important;
}
.nav a:hover {
  background: rgba(15, 23, 42, 0.05) !important;
  color: var(--primary) !important;
}
.nav a.is-active {
  background: var(--accent) !important;
  color: var(--text) !important;
}
.nav a .nav-num {
  color: var(--muted) !important;
  opacity: 0.75 !important;
  text-shadow: none !important;
}
.nav a:hover .nav-num { color: var(--primary) !important; opacity: 1 !important; }
.nav a.is-active .nav-num { color: var(--primary) !important; opacity: 1 !important; }
.nav-cta {
  background: var(--accent) !important;
  color: var(--text) !important;
  text-shadow: none !important;
  font-weight: 500;
  box-shadow: 0 4px 14px rgba(250, 204, 21, 0.35);
}
.nav-cta:hover {
  background: #fbd84a !important;
  color: var(--text) !important;
  box-shadow: 0 6px 20px rgba(250, 204, 21, 0.5);
}

/* Brand pill — match the white nav pill */
.brand {
  background: rgba(255, 255, 255, 0.95) !important;
  border-color: rgba(15, 23, 42, 0.06) !important;
  color: var(--text) !important;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18) !important;
}

/* === EXTRA: Slide-in animations for section blocks === */
@keyframes slide-from-left {
  from { opacity: 0; transform: translateX(-140px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slide-from-right {
  from { opacity: 0; transform: translateX(140px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slide-from-bottom {
  from { opacity: 0; transform: translateY(60px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim-slide-l {
  opacity: 0;
  animation: slide-from-left 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: var(--anim-delay, 0s);
}
.anim-slide-r {
  opacity: 0;
  animation: slide-from-right 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: var(--anim-delay, 0s);
}
.anim-slide-up {
  opacity: 0;
  animation: slide-from-bottom 1.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: var(--anim-delay, 0s);
}

/* === EXTRA: Mobile menu fix — visible on dark bg === */
.mobile-menu a {
  color: var(--text) !important;
  background: #fff !important;
  border-color: var(--border) !important;
}
.menu-toggle {
  color: var(--text) !important;
  background: rgba(247,247,242,0.92) !important;
}

/* === RESPONSIVE — 5 standard breakpoints: 360 · 768 · 1024 · 1280 · 1920 === */

/* ≥1920 — large desktop: roomier layout */
@media (min-width: 1920px) {
  :root {
    --container: 1480px;
    --section-pad: 9rem;

}

  .nav a { font-size: 0.92rem; padding: 0.7rem 1rem; }

}

/* ≤1024 — tablet landscape & below */
@media (max-width: 1024px) {
  .nav a { font-size: 0.88rem; padding: 0.6rem 0.85rem; gap: 0.45rem; }
  .nav a .nav-num { display: none; }
  .nav-cta { padding: 0.6rem 1rem !important; }
  .brand-logo-only .brand-mark { width: 60px; height: 60px; }
  .sluzby-grid { grid-template-columns: repeat(2, 1fr); }

/* ≤900 — switch to hamburger menu */

    align-items: center;
    gap: 0.5rem;

    border: 1px solid rgba(15, 23, 42, 0.06);
    padding: 0.7rem 1.15rem 0.7rem 1.05rem;

    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);

/* ≤768 — tablet portrait */
@media (max-width: 768px) {
  :root { --section-pad: 5rem; }
  .container { padding: 0 1.5rem; }
  .sluzby-grid { grid-template-columns: 1fr; }
  .sluzby-grid > :nth-child(3) { max-width: none; }
  .footer-grid { grid-template-columns: 1fr; gap: 2.5rem; }
  .kontakt-header { grid-template-columns: 1fr; gap: 1.5rem; }
  .kontakt-lead { text-align: left; }
  .kontakt-quick { grid-template-columns: 1fr; }
  .recenze-wrap { grid-template-columns: 1fr; }
  .recenze-col.offset { margin-top: 0; }
  .section-head { grid-template-columns: 1fr; }
  .section-head .head-meta { text-align: left; }
  .hero-meta { gap: 1.5rem; }
  .footer-legal { flex-direction: column; gap: 0.5rem; }
}

/* ≤640 — large phone */
@media (max-width: 640px) {
  .hero { padding-top: 6rem; padding-bottom: 3.5rem; min-height: auto; }
  .hero-meta { flex-direction: column; align-items: flex-start; }
  .hero-claim-block { flex-direction: column; gap: 1.5rem; align-items: stretch; }
  .hero-cta-row { flex-direction: column; width: 100%; }
  .hero-cta-row .btn { width: 100%; justify-content: center; }
  .quick-bubble {
    flex-wrap: wrap;
    padding: 1.25rem 1.25rem;
    border-radius: 24px;
  }
  .quick-bubble .qb-value { font-size: 1rem; }
  .quick-bubble .qb-icon { width: 48px; height: 48px; }
  .quick-bubble .qb-arrow { width: 38px; height: 38px; }
  .form-card-v2 { padding: 1.5rem; border-radius: 22px; }
  .form-card-v2-head { flex-direction: column; gap: 1rem; }
  .form-fields { grid-template-columns: 1fr !important; }
  .realizace-grid { grid-template-columns: 1fr; grid-auto-rows: 200px; gap: 1rem; }
  .r-43-l, .r-34, .r-43, .r-169, .r-sq, .r-tall, .r-wide, .r-sm {
    grid-column: 1 / -1; grid-row: span 1;
  }
  .sluzby-cta { grid-template-columns: 1fr; gap: 1.5rem; padding: 1.75rem; }
  .nav-shell { padding: 1rem 1.25rem; }
  .brand-logo-only .brand-mark { width: 52px; height: 52px; }
  .h2 { font-size: clamp(2rem, 8vw, 3rem); }
}

/* ≤360 — small phone */
@media (max-width: 360px) {
  .container { padding: 0 1rem; }
  .nav-shell { padding: 0.85rem 1rem; }

  .quick-bubble .qb-value { font-size: 0.92rem; }
  .quick-bubble .qb-label { font-size: 0.65rem; }
}

// Fixed-position animated gradient mesh background — plain JS, no React.

float hash21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }

  vec2 p3 = vec2( 0.80 - 0.10*s2,   0.55 - 0.07*cs2);

  // Navy palette with hints of teal and a warm yellow highlight (low weight)
  vec3 col0 = vec3(0.075, 0.165, 0.345); // deep navy
  vec3 col1 = vec3(0.135, 0.260, 0.490); // mid blue
  vec3 col2 = vec3(0.045, 0.110, 0.245); // darker navy
  vec3 col3 = vec3(0.220, 0.345, 0.560); // brighter blue accent
  float e=2.2;
  float w0=pow(1.0/(0.22+distance(uv,p0)),e);
  float w1=pow(1.0/(0.22+distance(uv,p1)),e);
  float w2=pow(1.0/(0.22+distance(uv,p2)),e);
  float w3=pow(1.0/(0.22+distance(uv,p3)),e);
  float ws=w0+w1+w2+w3;
  return (col0*w0+col1*w1+col2*w2+col3*w3)/ws;
}

void main()
{
  vec2 fc = gl_FragCoord.xy;
  vec2  R = iResolution.xy;
  float t = iTime;
  vec2 uv = (fc - 0.5*R) / max(R.y, 1.0);

  vec3 bg = meshGradient(uv, t);

  // Subtle warm-yellow highlight in upper right
  float yellowSpot = exp(-12.0 * length(uv - vec2(0.95, -0.55)));
  bg += vec3(0.18, 0.14, 0.04) * yellowSpot * 0.6;

  // Vignette toward edges to ground the composition
  float rad = length(uv);
  bg *= clamp(1.0 - 0.20 * rad, 0.0, 1.0);

  // Scrolling grid (very faint)
  vec2 scrollDir = normalize(vec2(1.0, -0.55));
  vec2 uvAnim = uv + SCROLL_SPEED * t * scrollDir;
  float thin  = gridLineAA (uvAnim, GRID_SCALE, THIN_WIDTH);
  float major = majorGridAA(uvAnim, GRID_SCALE, MAJOR_STEP, MAJOR_WIDTH);
  vec3 lineColor = vec3(0.45, 0.65, 0.90);
  bg += lineColor * thin  * 0.04;
  bg += lineColor * major * 0.07;

  // Film grain
  float n = vnoise(fc*0.7 + vec2(t*8.0, -t*6.0));
  bg += (n - 0.5) * 0.014;

  bg = clamp(bg, 0.0, 1.0);
  fragColor = vec4(bg, 1.0);
}

  const VERT = `#version 300 es
precision highp float;
layout(location=0) in vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

  function init() {
    let canvas = document.getElementById("shader-bg");
    if (!canvas) {
      canvas = document.createElement("canvas");
      canvas.id = "shader-bg";
      canvas.setAttribute("aria-hidden", "true");
      // Insert as first child of body so it sits behind everything
      document.body.insertBefore(canvas, document.body.firstChild);
    }

    const gl = canvas.getContext("webgl2", { premultipliedAlpha: false, antialias: false });
    if (!gl) {
      console.warn("[shader-bg] WebGL2 unavailable — using CSS fallback");
      canvas.style.background = "linear-gradient(135deg, #0c1d3d 0%, #1B3A6B 50%, #0c1d3d 100%)";
      return;
    }

    function compile(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        console.error("[shader-bg] compile error:", gl.getShaderInfoLog(sh));
        return null;
      }
      return sh;
    }
    const vs = compile(gl.VERTEX_SHADER, VERT);
    const fs = compile(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return;

    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error("[shader-bg] link error:", gl.getProgramInfoLog(prog));
      return;
    }

    const vao = gl.createVertexArray();
    const vbo = gl.createBuffer();
    gl.bindVertexArray(vao);
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

    const uRes = gl.getUniformLocation(prog, "iResolution");
    const uTime = gl.getUniformLocation(prog, "iTime");

    function resize() {
      const dpr = Math.min(1.5, window.devicePixelRatio || 1);
      const cssW = window.innerWidth;
      const cssH = window.innerHeight;
      const w = Math.max(1, Math.floor(cssW * dpr));
      const h = Math.max(1, Math.floor(cssH * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }
    resize();
    window.addEventListener("resize", resize);

    const start = performance.now();
    gl.useProgram(prog);
    gl.bindVertexArray(vao);

    function frame() {
      if (gl.isContextLost()) { requestAnimationFrame(frame); return; }
      const t = (performance.now() - start) / 1000;
      gl.uniform3f(uRes, canvas.width, canvas.height, 1);
      gl.uniform1f(uTime, t);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();

        const style = { "--d": `${d}s` };

        return (

            <span className="shutter-slice bot" style={style} aria-hidden="true">{ch}</span>

const initialForm = { name: "", email: "", phone: "", gdpr: false, hp: "" };

function Kontakt() {
  const [form, setForm] = useState(initialForm);
  const [errors, setErrors] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [copied, setCopied] = useState(null);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Vyplňte prosím své jméno";
    if (!form.email.trim()) e.email = "Vyplňte e-mail";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "Neplatný formát e-mailu";
    if (!form.phone.trim()) e.phone = "Vyplňte telefon";
    else if (form.phone.replace(/\D/g, "").length < 9) e.phone = "Neplatné telefonní číslo";
    if (!form.gdpr) e.gdpr = "Souhlas je povinný";
    return e;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (form.hp) return; // honeypot
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0) {
      setSubmitted(true);
    }
  };

  const copyToClipboard = (val, key) => {
    navigator.clipboard?.writeText(val);
    setCopied(key);
    setTimeout(() => setCopied(null), 1800);
  };

  return (
    <section id="kontakt" className="panel kontakt-section" data-screen-label="02 Kontakt">
      <div className="container">
        <div className="section-num-divider">
          <span className="divider-num">02 · KONTAKT</span>
          <span className="line" aria-hidden="true"></span>
          <span className="divider-num">Po–Pá 8:00–17:00</span>
        </div>

        {/* Header */}
        <div className="kontakt-header reveal">
          <div>
            <span className="kontakt-eyebrow mono">
              <span className="pulse" aria-hidden="true"></span>
              Právě teď přijímám zakázky
            </span>
            <h2 className="h2 kontakt-title">
              Pojďme si o&nbsp;<span className="hl">projektu</span><br />promluvit.
            </h2>
          </div>
          <p className="lead kontakt-lead">
            Tři pole, jeden odhad, žádný spam.<br />
            Ozvu se vám <strong>do&nbsp;24&nbsp;hodin</strong>.
          </p>
        </div>

        {/* Big tap-to-act bubbles */}
        <div className="kontakt-quick">
          <a href="tel:+420773058225" className="quick-bubble reveal slide-l" style={{ "--reveal-delay": "0s" }}>
            <span className="qb-icon"><Icon.Phone size={22} /></span>
            <span className="qb-body">
              <span className="qb-label">Zavolejte rovnou</span>
              <span className="qb-value">+420 773 058 225</span>
            </span>
            <span className="qb-arrow"><Icon.Arrow /></span>
            <button
              type="button"
              className="qb-copy"
              onClick={(e) => { e.preventDefault(); e.stopPropagation(); copyToClipboard("+420773058225", "tel"); }}
              title="Kopírovat"
              aria-label="Kopírovat telefon"
            >
              {copied === "tel" ? "✓" : "⧉"}
            </button>
          </a>
          <a href="mailto:info@kopecnyprojekt.cz" className="quick-bubble reveal slide-r" style={{ "--reveal-delay": "0.08s" }}>
            <span className="qb-icon"><Icon.Mail size={22} /></span>
            <span className="qb-body">
              <span className="qb-label">Napište e-mail</span>
              <span className="qb-value">info@kopecnyprojekt.cz</span>
            </span>
            <span className="qb-arrow"><Icon.Arrow /></span>
            <button
              type="button"
              className="qb-copy"
              onClick={(e) => { e.preventDefault(); e.stopPropagation(); copyToClipboard("info@kopecnyprojekt.cz", "email"); }}
              title="Kopírovat"
              aria-label="Kopírovat e-mail"
            >
              {copied === "email" ? "✓" : "⧉"}
            </button>
          </a>
        </div>

        <div className="kontakt-or" aria-hidden="true">
          <span className="line"></span>
          <span className="or-text mono">nebo odešlete poptávku</span>
          <span className="line"></span>
        </div>

        {/* FORM */}
        <div className="kontakt-form-wrap reveal" style={{ "--reveal-delay": "0.15s" }}>
          <div className="form-card-v2">
            {!submitted ? (
              <form onSubmit={submit} noValidate className="form-grid-v2">
                <div className="form-card-v2-head">
                  <div>
                    <div className="form-title">Nezávazná poptávka</div>
                    <div className="form-sub">Stačí tři pole. Odpovím vám do&nbsp;24&nbsp;hodin.</div>
                  </div>
                  <div className="form-step mono">
                    <span className="step-dot active"></span>
                    <span className="step-dot"></span>
                    <span>Krok&nbsp;1&nbsp;/&nbsp;2</span>
                  </div>
                </div>

                <div className="form-fields">
                  <Field
                    id="name" label="Jméno a příjmení"
                    value={form.name} error={errors.name}
                    onChange={(v) => setForm({ ...form, name: v })}
                    autoComplete="name"
                  />
                  <Field
                    id="email" label="E-mail" type="email"
                    value={form.email} error={errors.email}
                    onChange={(v) => setForm({ ...form, email: v })}
                    autoComplete="email"
                  />
                  <Field
                    id="phone" label="Telefon" type="tel"
                    value={form.phone} error={errors.phone}
                    onChange={(v) => setForm({ ...form, phone: v })}
                    autoComplete="tel"
                  />
                </div>

                {/* honeypot */}
                <input
                  className="honeypot" tabIndex="-1" autoComplete="off" aria-hidden="true"
                  name="website" value={form.hp}
                  onChange={(e) => setForm({ ...form, hp: e.target.value })}
                />

                <label className="gdpr">
                  <input
                    type="checkbox" checked={form.gdpr}
                    onChange={(e) => setForm({ ...form, gdpr: e.target.checked })}
                  />
                  <span className="box"><Icon.Check size={12} /></span>
                  <span>
                    Souhlasím se&nbsp;zpracováním osobních údajů pro&nbsp;účely vyřízení poptávky dle&nbsp;<a href="#">zásad GDPR</a>.
                  </span>
                </label>
                {errors.gdpr && <span className="err-msg mono">{errors.gdpr}</span>}

                <button type="submit" className="btn btn-primary form-submit-v2">
                  Odeslat poptávku
                  <span className="btn-arrow"><Icon.Arrow /></span>
                </button>
              </form>
            ) : (
              <div className="form-success-v2">
                <div className="success-icon">
                  <Icon.Check size={28} />
                </div>
                <div className="success-title">Děkuji, poptávka dorazila.</div>
                <div className="success-sub">Ozvu se vám telefonicky nebo e-mailem do&nbsp;24&nbsp;hodin, obvykle dříve.</div>
                <button onClick={() => { setForm(initialForm); setSubmitted(false); }} className="btn btn-secondary btn-light" style={{ marginTop: "1.5rem" }}>
                  Odeslat další
                </button>
              </div>
            )}
          </div>
        </div>

        {/* Business meta strip */}
        <div className="kontakt-meta">
          <MetaItem label="Sídlo">Brněnská 602, 664 82&nbsp;Říčany u&nbsp;Brna</MetaItem>
          <MetaItem label="IČO" copyable value="03519392" onCopy={() => copyToClipboard("03519392", "ico")} copied={copied === "ico"}>03519392</MetaItem>
          <MetaItem label="DIČ">CZ7908183866</MetaItem>
          <MetaItem label="Provozní doba">Po–Pá 8:00–17:00 · po&nbsp;domluvě i&nbsp;mimo</MetaItem>
          <MetaItem label="Působnost">Brno a&nbsp;Jihomoravský kraj · ČR po&nbsp;domluvě</MetaItem>
        </div>
      </div>
    </section>
  );
}

function MetaItem({ label, children, copyable, onCopy, copied, value }) {
  return (
    <div className={"meta-item" + (copyable ? " is-copyable" : "")} onClick={copyable ? onCopy : undefined} role={copyable ? "button" : undefined} tabIndex={copyable ? 0 : undefined}>
      <span className="meta-label mono">{label}</span>
      <span className="meta-value">{children}</span>
      {copyable && <span className="meta-copy mono">{copied ? "✓ zkopírováno" : "klikněte pro kopírování"}</span>}
    </div>
  );
}

function InfoRow({ label, value, muted, href, copy, onCopy, copyKey, copied }) {
  return (
    <div className="info-row">
      <span className="label">{label}</span>
      {href
        ? <a href={href} className="value">{value}{muted && <span style={{ color: "var(--muted)", fontWeight: 400, marginLeft: 8, fontSize: "0.85em" }}>· {muted}</span>}</a>
        : <span className="value">{value}{muted && <span style={{ color: "var(--muted)", fontWeight: 400, marginLeft: 8, fontSize: "0.85em" }}>· {muted}</span>}</span>}
      {copy
        ? <button type="button" className="copy" onClick={() => onCopy(value, copyKey)}>
            {copied === copyKey ? "Zkopírováno" : "Kopírovat"}
          </button>
        : <span></span>}
    </div>
  );
}

function Field({ id, label, value, onChange, error, type = "text", autoComplete }) {
  return (
    <div className={"field" + (error ? " error" : "")}>
      <input
        id={id} type={type} value={value} placeholder=" "
        autoComplete={autoComplete}
        onChange={(e) => onChange(e.target.value)}
      />
      <label htmlFor={id}>{label}</label>
      {error && <span className="err-msg">{error}</span>}
    </div>
  );
}

/* ===================== APP ===================== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#FACC15",
  "primary": "#1B3A6B",
  "heroHeavy": false,
  "showGlow": true,
  "denseLayout": false
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [lightbox, setLightbox] = useState(null);
  const [toast, setToast] = useState("");

  // Apply tweak values to root
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent", t.accent);
    root.style.setProperty("--primary", t.primary);
  }, [t.accent, t.primary]);

  // Hero heavy variant
  useEffect(() => {
    document.body.classList.toggle("hero-heavy", !!t.heroHeavy);
    document.body.classList.toggle("no-glow", !t.showGlow);
    document.body.classList.toggle("dense", !!t.denseLayout);
  }, [t.heroHeavy, t.showGlow, t.denseLayout]);

  // Scroll reveal — additive (defaults to visible; JS adds .pre to hide pre-paint)
  useEffect(() => {
    const reveals = Array.from(document.querySelectorAll(".reveal"));
    // Mark all as pre-hidden first
    reveals.forEach((el) => el.classList.add("pre"));
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.remove("pre");
            obs.unobserve(e.target);
          }
        });
      },
      { threshold: 0.08, rootMargin: "0px 0px -8% 0px" }
    );
    reveals.forEach((el) => obs.observe(el));
    // Safety: clear any still-pre after 3s (e.g., observer didn't fire)
    const t = setTimeout(() => {
      document.querySelectorAll(".reveal.pre").forEach((el) => el.classList.remove("pre"));
    }, 3000);
    return () => { obs.disconnect(); clearTimeout(t); };
  }, []);

  // Toast on clipboard
  useEffect(() => {
    const handler = (ev) => {
      if (ev.target.classList?.contains("copy")) {
        setToast("Zkopírováno do schránky");
        setTimeout(() => setToast(""), 1800);
      }
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, []);

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <Kontakt />
        <Sluzby />
        <Realizace onOpen={setLightbox} />
        <Hodnoceni />
      </main>
      <Footer />
      {/* Lightbox */}
      <div className={"lightbox" + (lightbox ? " open" : "")} onClick={() => setLightbox(null)}>
        {lightbox && (
          <div className="lb-content" onClick={(e) => e.stopPropagation()}>
            <button className="lb-close" onClick={() => setLightbox(null)}><Icon.Close /></button>
            <div className="lb-img">
              <span style={{ position: "absolute", top: "1rem", left: "1rem", fontFamily: "var(--font-mono)", fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--primary)", background: "rgba(255,255,255,0.85)", backdropFilter: "blur(6px)", padding: "0.35rem 0.6rem", borderRadius: "9999px" }}>
                Reálnou fotografii dodá klient
              </span>
            </div>
            <div className="lb-info">
              <span className="lb-meta">{lightbox.type} · {lightbox.year}</span>
              <span className="lb-title">{lightbox.title}</span>
              <span style={{ color: "var(--muted)" }}>{lightbox.loc} · {lightbox.ratio}</span>
            </div>
          </div>
        )}
      </div>

      {/* Toast */}
      <div className={"toast" + (toast ? " show" : "")}>
        <span className="check"><Icon.Check size={12} /></span>
        {toast}
      </div>

      {/* Tweaks panel */}
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Brand colors">
          <window.TweakColor
            label="Accent"
            value={t.accent}
            onChange={(v) => setTweak("accent", v)}
            options={["#FACC15", "#F97316", "#10B981", "#6366F1"]}
          />
          <window.TweakColor
            label="Primary"
            value={t.primary}
            onChange={(v) => setTweak("primary", v)}
            options={["#1B3A6B", "#0F172A", "#1F2937", "#7C2D12"]}
          />
        </window.TweakSection>
        <window.TweakSection title="Layout">
          <window.TweakToggle
            label="Hero radial glow"
            value={t.showGlow}
            onChange={(v) => setTweak("showGlow", v)}
          />
          <window.TweakToggle
            label="Compact density"
            value={t.denseLayout}
            onChange={(v) => setTweak("denseLayout", v)}
          />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
  // Scroll-triggered slide animations — bullet-proof verze
  (function() {
    var SELECTOR = '.service-card, .quick-bubble, .realizace-cell, .recenze-card';

    function setupItem(el, idx) {
      // Strip the original "reveal" class so it doesn't fight us
      el.classList.remove('reveal', 'pre', 'slide-l', 'slide-r');
      // Hide initially with inline style + transform (highest specificity)
      var isEven = idx % 2 === 0;
      el.style.opacity = '0';
      el.style.transform = isEven ? 'translateX(-140px)' : 'translateX(140px)';
      el.style.transition = 'opacity 1.3s cubic-bezier(0.16, 1, 0.3, 1), transform 1.3s cubic-bezier(0.16, 1, 0.3, 1)';
      el.style.willChange = 'opacity, transform';
      el.dataset.animDir = isEven ? 'l' : 'r';
    }

    function revealItem(el, idx) {
      var delay = (idx * 0.12);
      el.style.transitionDelay = delay + 's, ' + delay + 's';
      // force a frame so the transition kicks in
      requestAnimationFrame(function() {
        el.style.opacity = '1';
        el.style.transform = 'translateX(0)';
      });
    }

    function init() {
      var items = document.querySelectorAll(SELECTOR);
      if (!items.length) {
        // React still rendering — retry
        setTimeout(init, 200);
        return;
      }

      // Group items by their parent for local indexing
      var groups = {};
      items.forEach(function(el) {
        var key = el.parentElement ? el.parentElement.className + '|' + (el.parentElement.tagName) : 'root';
        if (!groups[key]) groups[key] = [];
        groups[key].push(el);
      });

      // Setup each item with its local index
      Object.keys(groups).forEach(function(k) {
        groups[k].forEach(function(el, i) {
          setupItem(el, i);
          el.dataset.localIdx = i;
        });
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var el = entry.target;
          if (el.dataset.animated) return;
          el.dataset.animated = '1';
          revealItem(el, parseInt(el.dataset.localIdx || 0, 10));
          observer.unobserve(el);
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      items.forEach(function(el) { observer.observe(el); });

      // Safety net — anything still hidden after 4s, just show it
      setTimeout(function() {
        items.forEach(function(el) {
          if (!el.dataset.animated) {
            el.dataset.animated = '1';
            el.style.opacity = '1';
            el.style.transform = 'translateX(0)';
          }
        });
      }, 4000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(init, 500);
      });
    } else {
      setTimeout(init, 500);
    }
  })();
  </script>
